services:
  dockyard:
    build: .
    container_name: dockyard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - TZ=UTC
    command:
      - "--web-ui"
      - "--web-ui-port"
      - "8080"
      - "--schedule"
      - "0 3 * * *"
      - "--cleanup"
      - "--update-on-start"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
