<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dock: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="text-dock-500 text-xl">&#9875;</div>
                    <span class="text-lg font-bold tracking-tight">Dockyard</span>
                </div>
                <div class="flex items-center gap-1">
                    <a href="/" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Dashboard</a>
                    <a href="/settings" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Settings</a>
                    <a href="/history" class="px-3 py-1.5 rounded-md text-sm font-medium bg-gray-800 text-white">History</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <h1 class="text-2xl font-bold mb-6">Update History</h1>

        <div id="history-list" class="space-y-2">
            <div id="history-table"></div>
        </div>

        <div id="empty-state" class="hidden text-center py-16 text-gray-500">
            <div class="text-4xl mb-3">&#128203;</div>
            <p>No update history yet</p>
            <p class="text-sm mt-1">Updates will appear here once you start managing containers</p>
        </div>
    </div>

    <script>
        fetch('/api/history')
            .then(r => r.json())
            .then(data => {
                if (!data || data.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    document.getElementById('history-table').classList.add('hidden');
                    return;
                }

                let html = '<div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">' +
                    '<table class="w-full">' +
                    '<thead class="bg-gray-800/50">' +
                    '<tr>' +
                    '<th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Container</th>' +
                    '<th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Image</th>' +
                    '<th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>' +
                    '<th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Time</th>' +
                    '</tr></thead><tbody class="divide-y divide-gray-800">';

                data.forEach(h => {
                    let statusBadge = h.status === 'success' ?
                        '<span class="inline-flex items-center gap-1 text-xs font-medium text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full">&#10003; Success</span>' :
                        (h.status === 'failed' ?
                            '<span class="inline-flex items-center gap-1 text-xs font-medium text-red-400 bg-red-500/10 px-2 py-0.5 rounded-full">&#10007; Failed</span>' :
                            '<span class="inline-flex items-center gap-1 text-xs font-medium text-gray-400 bg-gray-500/10 px-2 py-0.5 rounded-full">' + h.status + '</span>');

                    html += '<tr class="hover:bg-gray-800/30 transition-colors">' +
                        '<td class="px-4 py-3 text-sm font-medium text-white">' + h.container + '</td>' +
                        '<td class="px-4 py-3 text-sm text-gray-400 font-mono truncate max-w-xs">' + (h.image_name || '-') + '</td>' +
                        '<td class="px-4 py-3">' + statusBadge + '</td>' +
                        '<td class="px-4 py-3 text-sm text-gray-500">' + new Date(h.timestamp).toLocaleString() + '</td>' +
                        '</tr>';
                });

                html += '</tbody></table></div>';
                document.getElementById('history-table').innerHTML = html;
            });
    </script>
</body>
</html>
