<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dock: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .log-line { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="text-dock-500 text-xl">&#9875;</div>
                    <span class="text-lg font-bold tracking-tight">Dockyard</span>
                </div>
                <div class="flex items-center gap-1">
                    <a href="/" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Dashboard</a>
                    <a href="/settings" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Settings</a>
                    <a href="/history" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">History</a>
                    <a href="/logs" class="px-3 py-1.5 rounded-md text-sm font-medium bg-gray-800 text-white">Logs</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Activity Logs</h1>
                <p class="text-sm text-gray-500 mt-0.5">Dockyard actions: updates, checks, and notifications</p>
            </div>
            <div class="flex items-center gap-2">
                <select id="filter-container" onchange="loadLogs()" class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded-lg px-2 py-1">
                    <option value="">All containers</option>
                </select>
                <button onclick="loadLogs()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1 rounded-lg text-sm transition-colors">&#8635;</button>
                <button onclick="copyLogs()" class="text-xs text-gray-600 hover:text-gray-400 px-2 py-1">Copy</button>
            </div>
        </div>

        <div id="log-output" class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
            <div class="p-4 max-h-[70vh] overflow-y-auto" id="log-list">
                <div class="text-center py-12 text-gray-500">
                    <div class="animate-spin text-2xl mb-2">&#8635;</div>
                    Loading logs...
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var allLogs = [];

        function esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }

        function fmtTime(ts) {
            var d = new Date(ts);
            return d.toLocaleString();
        }

        function colorForContainer(name) {
            if (!name) return 'text-gray-500';
            var hash = 0;
            for (var i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
            var colors = ['text-dock-400', 'text-emerald-400', 'text-amber-400', 'text-purple-400', 'text-pink-400', 'text-cyan-400', 'text-orange-400', 'text-teal-400'];
            return colors[Math.abs(hash) % colors.length];
        }

        function renderLogs(logs) {
            var el = document.getElementById('log-list');
            if (!logs || logs.length === 0) {
                el.innerHTML = '<div class="text-center py-12 text-gray-600">No logs yet</div>';
                return;
            }
            var html = '';
            for (var i = logs.length - 1; i >= 0; i--) {
                var l = logs[i];
                html += '<div class="flex items-start gap-3 py-1.5 border-b border-gray-800/50">'
                    + '<span class="text-xs text-gray-600 whitespace-nowrap mt-0.5 log-line">' + esc(fmtTime(l.timestamp)) + '</span>'
                    + '<span class="text-xs ' + colorForContainer(l.container) + ' font-medium whitespace-nowrap mt-0.5">' + esc(l.container || 'system') + '</span>'
                    + '<span class="text-xs text-gray-300 log-line">' + esc(l.message) + '</span>'
                    + '</div>';
            }
            el.innerHTML = html;
            el.scrollTop = 0;
        }

        function populateFilter() {
            var containers = {};
            allLogs.forEach(function(l) {
                if (l.container) containers[l.container] = true;
            });
            var sel = document.getElementById('filter-container');
            var current = sel.value;
            while (sel.options.length > 1) sel.remove(1);
            Object.keys(containers).sort().forEach(function(name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === current) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        window.loadLogs = function() {
            var container = document.getElementById('filter-container').value;
            var url = '/api/logs';
            if (container) url += '?container=' + encodeURIComponent(container);

            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    allLogs = data;
                    populateFilter();
                    renderLogs(data);
                })
                .catch(function() {
                    document.getElementById('log-list').innerHTML = '<div class="text-center py-12 text-red-400">Failed to load logs</div>';
                });
        };

        window.copyLogs = function() {
            var lines = [];
            allLogs.forEach(function(l) {
                lines.push(fmtTime(l.timestamp) + ' [' + (l.container || 'system') + '] ' + l.message);
            });
            navigator.clipboard.writeText(lines.join('\n')).then(function() {
                var btns = document.querySelectorAll('[onclick="copyLogs()"]');
                btns.forEach(function(b) { b.textContent = 'Copied!'; setTimeout(function() { b.textContent = 'Copy'; }, 2000); });
            });
        };

        loadLogs();

        // Auto-refresh every 15s
        setInterval(loadLogs, 15000);
    })();
    </script>
</body>
</html>
