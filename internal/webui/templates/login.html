<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Dockyard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dock: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <div class="text-dock-500 text-5xl mb-3">&#9875;</div>
            <h1 class="text-3xl font-bold">Dockyard</h1>
            <p class="text-gray-500 text-sm mt-1">Docker Container Update Manager</p>
        </div>

        {{if .Error}}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-xl mb-4">
            {{.Error}}
        </div>
        {{end}}

        {{if .IsSetup}}
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold mb-1">Create Admin Account</h2>
            <p class="text-sm text-gray-500 mb-4">Set up your first account to get started.</p>
            <form method="POST" action="/auth/register" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                    <input type="text" name="username" required autofocus
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-dock-500 focus:border-dock-500"
                        placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-dock-500 focus:border-dock-500"
                        placeholder="min 6 characters">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Confirm Password</label>
                    <input type="password" name="confirm_password" required minlength="6"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-dock-500 focus:border-dock-500">
                </div>
                <button type="submit" class="w-full bg-dock-600 hover:bg-dock-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
                    Create Account
                </button>
            </form>
        </div>
        {{else}}
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold mb-4">Sign In</h2>
            <form method="POST" action="/auth/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                    <input type="text" name="username" required autofocus
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-dock-500 focus:border-dock-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-dock-500 focus:border-dock-500">
                </div>
                <button type="submit" class="w-full bg-dock-600 hover:bg-dock-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
                    Sign In
                </button>
            </form>
        </div>
        {{end}}

        <p class="text-center text-xs text-gray-600 mt-6">Dockyard &mdash; Docker Container Update Manager</p>
    </div>
</body>
</html>
